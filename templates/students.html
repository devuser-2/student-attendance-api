<!DOCTYPE html>
<html>
<head>
    <title>Students</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h3>Students</h3>

<input id="name" class="form-control mb-2" placeholder="Name">
<input id="class_name" class="form-control mb-2" placeholder="Class">
<input id="mobile" class="form-control mb-2" placeholder="Mobile">

<button class="btn btn-success" onclick="addStudent()">Add Student</button>

<hr>

<table class="table">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Class</th>
        </tr>
    </thead>
    <tbody id="list"></tbody>
</table>

<script>
async function addStudent() {

    let name = document.getElementById("name").value.trim();
    let class_name = document.getElementById("class_name").value.trim();
    let mobile = document.getElementById("mobile").value.trim();

    if (!name || !class_name || !mobile) {
        alert("Please fill all fields");
        return;
    }

    let token = localStorage.getItem("token");

    await fetch("/students", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
            name,
            class_name,
            mobile
        })
    });

    loadStudents();
}

async function loadStudents() {

    let token = localStorage.getItem("token");

    let res = await fetch("/students", {
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    let data = await res.json();

    let html = "";

    data.forEach(s => {
        html += `<tr>
            <td>${s.id}</td>
            <td>${s.name}</td>
            <td>${s.class_name}</td>
        </tr>`;
    });

    document.getElementById("list").innerHTML = html;
}

loadStudents();
</script>

</body>
</html>
