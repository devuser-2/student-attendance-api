<!DOCTYPE html>
<html>
<head>
    <title>Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h3>Mark Attendance</h3>

<!-- Student Dropdown -->
<select id="student_id" class="form-control mb-2"></select>

<!-- Date -->
<input type="date" id="attendance_date" class="form-control mb-2">

<!-- Status -->
<select id="status" class="form-control mb-3">
    <option value="Present">Present</option>
    <option value="Absent">Absent</option>
</select>

<button class="btn btn-success" onclick="markAttendance()">
    Mark Attendance
</button>

<hr>

<h4>Today's Attendance</h4>

<table class="table">
    <thead>
        <tr>
            <th>Student</th>
            <th>Date</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody id="list"></tbody>
</table>

<script>

async function loadStudents() {

    let token = localStorage.getItem("token");

    let res = await fetch("/students", {
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    let data = await res.json();

    let html = "";

    data.forEach(s => {
        html += `<option value="${s.id}">${s.name} (${s.class_name})</option>`;
    });

    document.getElementById("student_id").innerHTML = html;
}

async function markAttendance() {

    let token = localStorage.getItem("token");

    await fetch("/attendance", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
            student_id: document.getElementById("student_id").value,
            attendance_date: document.getElementById("attendance_date").value,
            status: document.getElementById("status").value
        })
    });

    loadAttendance();
}

async function loadAttendance() {

    let res = await fetch("/attendance");
    let data = await res.json();

    let html = "";

    data.forEach(a => {
        html += `<tr>
            <td>${a.student_name}</td>
            <td>${a.date}</td>
            <td>${a.status}</td>
        </tr>`;
    });

    document.getElementById("list").innerHTML = html;
}

loadStudents();
loadAttendance();

</script>

</body>
</html>
